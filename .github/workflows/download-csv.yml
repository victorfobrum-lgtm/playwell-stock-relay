name: Download Playwell CSV

on:
  schedule:
    - cron: '0 */6 * * *'   # Runs every 6 hours
  workflow_dispatch:          # Allows manual run from Actions tab

jobs:
  download-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download CSV from Playwell FTP
        run: |
          curl \
            --user "datafeed:${{ secrets.FTP_PASSWORD }}" \
            "ftp://161.35.45.163/playwell-stock-webtoffee.csv" \
            -o playwell-stock-webtoffee.csv

      - name: Commit and push updated CSV
        run: |
          git config user.name "Playwell Sync Bot"
          git config user.email "bot@jdbsports.co.uk"
          git add playwell-stock-webtoffee.csv
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Auto-sync: Playwell stock update $(date -u '+%Y-%m-%d %H:%M') UTC"
          git pull --rebase origin main
          git push origin main
